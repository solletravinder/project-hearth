version: '3.8'

services:
  backend:
    build:
      context: ./hearth
      dockerfile: Dockerfile.backend
    ports:
      - "8765:8765"
    volumes:
      - hearth-data:/app/data
      - hearth-models:/app/models
    environment:
      - HEARTH_HOST=0.0.0.0
      - HEARTH_PORT=8765
      - HEARTH_DATA_DIR=/app/data
      - HEARTH_MODELS_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hearth-net

  frontend:
    build:
      context: ./hearth/static/frontend
      dockerfile: ../../Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8765
    restart: unless-stopped
    networks:
      - hearth-net

volumes:
  hearth-data:
  hearth-models:

networks:
  hearth-net:
    driver: bridge